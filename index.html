<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strata CRM — Carrier Relationship Management · Aspen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  --nav:#1a2b3c;--page:#f4f6f8;--card:#fff;--cb:#e8ecf2;--cbs:#f0f3f7;--cr:#f7f9fb;--sidebar:#fff;
  --lime:#7cb800;--lt:#ecf5cc;--ld:#5a8a00;
  --ts:#20303f;--tb:#4a5568;--tm:#6a7485;--tsu:#9aa3b0;--tf:#c0c8d4;
  --ok:#27ae60;--okd:#1a6b34;--okb:#e8f8ef;--warn:#9a6200;--warnb:#fef3dc;
  --crit:#c0392b;--critb:#fde8e8;--info:#2563eb;--infob:#eff6ff;
  --purple:#7c3aed;--purpleb:#faf5ff;
  --navh:54px;--subh:38px;--railw:206px;--railc:54px;--rsm:5px;--rmd:8px;--rlg:10px;
  --shc:0 1px 3px rgba(26,43,60,.08);--shm:0 2px 8px rgba(26,43,60,.09);--shl:0 8px 28px rgba(26,43,60,.16);
}
[data-theme="dark"]{
  --nav:#070d16;--page:#111827;--card:#1c2433;--cb:#2a3a50;--cbs:#1f2d40;--cr:#212d3f;--sidebar:#0c1828;
  --lime:#8ed600;--lt:#1a3010;--ld:#a3e635;
  --ts:#e2e8f0;--tb:#cbd5e1;--tm:#94a3b8;--tsu:#64748b;--tf:#475569;
  --ok:#4ade80;--okd:#4ade80;--okb:#0f2a1a;--warn:#fbbf24;--warnb:#2a1f10;
  --crit:#f87171;--critb:#2a1414;--info:#60a5fa;--infob:#0f1f33;
  --purple:#a78bfa;--purpleb:#1d1530;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--page);font-size:13px;color:var(--ts);-webkit-font-smoothing:antialiased;transition:background .15s}
a{text-decoration:none;color:inherit}
svg{display:block}
.ic{width:15px;height:15px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPNAV */
.topnav{background:var(--nav);display:flex;align-items:center;padding:0 18px;height:var(--navh);gap:14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.05)}
.logo{display:flex;align-items:center;cursor:pointer;flex-shrink:0}
.logo-a span{display:block;font-size:8px;font-weight:400;color:#c8d8e8;letter-spacing:.5px;text-transform:uppercase;line-height:1.2}
.logo-a strong{font-size:15px;font-weight:800;letter-spacing:-.3px;color:#fff}
.logo-d{width:1px;height:26px;background:rgba(255,255,255,.13);margin:0 13px}
.logo-s span{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#6b96c4;display:block;line-height:1.2}
.logo-s strong{font-size:13px;font-weight:700;letter-spacing:.02em;color:#fff}
.search{flex:1;max-width:540px;position:relative;display:flex;align-items:center}
.search input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:7px 14px 7px 34px;font-size:12px;color:#fff;font-family:var(--font)}
.search input::placeholder{color:rgba(255,255,255,.45)}
.search input:focus{outline:none;background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.35)}
.search .ic{position:absolute;left:11px;width:14px;height:14px;color:rgba(255,255,255,.5)}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-shrink:0}
.live{font-size:11px;color:#a0e0b0;display:flex;align-items:center;gap:5px;font-weight:600}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.tnav-div{width:1px;height:18px;background:rgba(255,255,255,.13)}
.tnav-date{font-size:11px;color:#dce8f4;font-weight:500}
.icon-btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);cursor:pointer}
.icon-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.icon-btn .ic{width:14px;height:14px}
.user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 12px 4px 5px}
.user-av{width:26px;height:26px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--nav)}
.user-meta{line-height:1.15}
.user-meta b{font-size:11px;color:#dce8f4;font-weight:600;display:block}
.user-meta span{font-size:9px;color:#6b96c4;text-transform:uppercase;letter-spacing:.4px}

/* ROLEBAR */
.rolebar{background:var(--cr);border-bottom:1px solid var(--cb);padding:0 18px;height:var(--subh);display:flex;align-items:center;gap:4px;flex-shrink:0}
.role-lbl{font-size:10px;font-weight:600;color:var(--tsu);letter-spacing:.3px;margin-right:6px;text-transform:uppercase}
.role-btn{padding:4px 13px;border-radius:var(--rsm);font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--tm);font-family:var(--font)}
.role-btn:hover{background:var(--cbs)}
.role-btn.active{background:var(--lime);color:#fff;font-weight:700}
.rolebar-note{margin-left:auto;font-size:10px;color:var(--tsu)}

.body-row{display:flex;flex:1;overflow:hidden}

/* RAIL */
.rail{background:var(--sidebar);border-right:1px solid var(--cb);display:flex;flex-direction:column;width:var(--railw);flex-shrink:0;overflow-y:auto;transition:width .18s}
.rail.collapsed{width:var(--railc)}
.rail-sec{padding:8px 0}
.rail-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--tf);padding:8px 16px 4px}
.rail.collapsed .rail-lbl{opacity:0;height:10px;padding:4px 0}
.rail.collapsed .rail-sec:not(:first-child){border-top:1px solid var(--cbs)}
.rail-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-left:2px solid transparent;font-size:12px;color:var(--tb);white-space:nowrap}
.rail-item:hover{background:var(--cr);color:var(--ts)}
.rail-item.active{background:var(--lt);border-left-color:var(--lime);color:var(--ts);font-weight:600}
.rail-item .ic{opacity:.5}
.rail-item.active .ic{opacity:1;color:var(--ld)}
.rail.collapsed .rail-item{justify-content:center;padding:9px 0}
.rail.collapsed .rail-item span,.rail.collapsed .r-badge{display:none}
.r-badge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
.rb-red{background:var(--critb);color:var(--crit)}
.rb-lime{background:var(--lt);color:var(--ld)}
.rail-collapse{margin-top:auto;border-top:1px solid var(--cbs);display:flex;align-items:center;gap:8px;padding:11px 16px;font-size:11px;font-weight:500;color:var(--tm);cursor:pointer;flex-shrink:0}
.rail-collapse:hover{background:var(--cr);color:var(--ts)}
.rail.collapsed .rail-collapse{justify-content:center;padding:11px 0}
.rail.collapsed .rail-collapse span{display:none}

.main{flex:1;overflow-y:auto;min-width:0}

/* SHARED */
.page-hdr{padding:16px 24px;display:flex;align-items:flex-start;justify-content:space-between;background:var(--card);border-bottom:1px solid var(--cb)}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.4px;color:var(--ts)}
.page-sub{font-size:12px;color:var(--tm);margin-top:3px}
.scope{font-size:11px;color:var(--tf);margin-top:4px;display:inline-flex;align-items:center;gap:5px}
.scope b{color:var(--ld);font-weight:700}
.btn{border-radius:var(--rsm);padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--cb);background:var(--card);color:var(--tb);display:inline-flex;align-items:center;gap:6px;font-family:var(--font)}
.btn:hover{background:var(--cr)}
.btn .ic{width:14px;height:14px}
.btn-primary{background:var(--lime);color:#fff;border-color:var(--lime)}
.btn-primary:hover{background:var(--ld);color:#fff}
.sec-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--tsu);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.sec-link{font-size:10px;font-weight:600;color:var(--info);background:none;border:none;cursor:pointer;font-family:var(--font);margin-left:auto}
.sec-link:hover{text-decoration:underline}
.pill-count{font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px}
.content-body{padding:16px 24px 48px}
.card{background:var(--card);border:1px solid var(--cb);border-radius:var(--rlg);padding:16px;margin-bottom:10px;box-shadow:var(--shc)}
.empty{text-align:center;padding:28px;color:var(--tsu);font-size:12px}
.empty strong{display:block;font-size:13px;color:var(--tm);margin-bottom:5px}

/* RS BADGES */
.rs{font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.rs-ac{background:var(--okb);color:var(--okd)}
.rs-pa{background:var(--warnb);color:var(--warn)}
.rs-ap{background:var(--purpleb);color:var(--purple)}
.rs-nu{background:#fff7ed;color:#c2410c}
.rs-do{background:var(--cbs);color:var(--tm)}
.rs-ar{background:var(--cbs);color:var(--tsu);opacity:.8}
[data-theme="dark"] .rs-nu{background:#2a1814;color:#fb923c}

/* ROWS */
.row{background:var(--card);border:1px solid var(--cb);border-radius:var(--rmd);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:6px;box-shadow:var(--shc)}
.row:hover{box-shadow:var(--shm);border-color:var(--lime)}
.av{width:36px;height:36px;border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.av-rd{border-radius:50%}
.row-body{flex:1;min-width:0}
.row-name{font-size:13px;font-weight:700;color:var(--ts);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-meta{font-size:11px;color:var(--tm);margin-top:2px}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.lmc{font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px}
.lmc .ic{width:11px;height:11px}
.lmc-green{color:var(--okd)}.lmc-amber{color:var(--warn)}.lmc-red{color:var(--crit)}
.strat{font-size:9px;color:var(--okd);background:var(--okb);padding:1px 7px;border-radius:10px;display:inline-flex;align-items:center;gap:3px;font-weight:700}
.strat .ic{width:10px;height:10px;fill:var(--okd);stroke:var(--okd)}
.owner-chip{font-size:10px;color:var(--tsu);display:flex;align-items:center;gap:5px}
.owner-av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;flex-shrink:0}

/* PORTFOLIO */
.eco-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.eco-tile{background:var(--card);border:1px solid var(--cb);border-radius:var(--rlg);padding:14px 12px;cursor:pointer;text-align:center;box-shadow:var(--shc)}
.eco-tile:hover{box-shadow:var(--shm);transform:translateY(-1px);border-color:var(--lime)}
.eco-val{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1}
.eco-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--tsu);margin-top:5px}

/* ATTENTION */
.att{background:var(--card);border:1px solid var(--cb);border-radius:var(--rlg);padding:13px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;border-left:3px solid;margin-bottom:6px;box-shadow:var(--shc)}
.att:hover{box-shadow:var(--shm)}
.att-crit{border-left-color:var(--crit)}.att-warn{border-left-color:var(--warn)}.att-info{border-left-color:var(--info)}
.att-ic{width:34px;height:34px;border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.att-ic .ic{width:17px;height:17px}
.att-ic-r{background:var(--critb);color:var(--crit)}.att-ic-a{background:var(--warnb);color:var(--warn)}.att-ic-b{background:var(--infob);color:var(--info)}
.att-body{flex:1;min-width:0}
.att-carrier{font-size:13px;font-weight:700;color:var(--ts)}
.att-line{font-size:11px;color:var(--tm)}
.att-cond{font-size:12px;font-weight:600;margin-top:4px;line-height:1.4}
.att-crit .att-cond{color:var(--crit)}.att-warn .att-cond{color:var(--warn)}.att-info .att-cond{color:var(--info)}
.att-dur{font-size:10px;color:var(--tsu);margin-top:2px}
.att-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px}

/* STAGE/HEALTH */
.stage{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.sb-prospect{background:var(--cbs);color:var(--tm)}.sb-engaged{background:var(--infob);color:var(--info)}
.sb-discovery{background:var(--purpleb);color:var(--purple)}.sb-proposal{background:#fff7ed;color:#c2410c}
.sb-pending{background:var(--warnb);color:var(--warn)}.sb-onboarding{background:var(--okb);color:var(--okd)}
.sb-won{background:var(--okb);color:var(--okd)}
[data-theme="dark"] .sb-proposal{background:#2a1814;color:#fb923c}
.health{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px}
.hc-ok{background:var(--okb);color:var(--okd)}.hc-att{background:var(--warnb);color:var(--warn)}

/* ACTIVITY */
.act{display:flex;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--cb);border-radius:var(--rmd);margin-bottom:6px;cursor:pointer;box-shadow:var(--shc)}
.act:hover{box-shadow:var(--shm)}
.act.mc{border-left:3px solid var(--ok)}
.act-ic{width:28px;height:28px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-ic .ic{width:14px;height:14px}
.ai-email{background:var(--infob);color:var(--info)}.ai-call{background:var(--okb);color:var(--okd)}
.ai-meeting{background:var(--warnb);color:var(--warn)}.ai-note{background:var(--cr);color:var(--tm)}
.act-body{flex:1;min-width:0}
.act-subj{font-size:12px;font-weight:600;color:var(--ts);line-height:1.35}
.act-meta{font-size:10px;color:var(--tsu);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mc-badge{font-size:9px;font-weight:700;color:var(--okd);background:var(--okb);padding:1px 6px;border-radius:20px}

/* TASK */
.task{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;background:var(--card);border:1px solid var(--cb);border-radius:var(--rmd);margin-bottom:6px;box-shadow:var(--shc)}
.task.t-over{border-left:3px solid var(--crit)}.task.t-today{border-left:3px solid var(--warn)}
.task.t-trigger{background:var(--warnb)}
.task.done{opacity:.5}
.task.done .task-title{text-decoration:line-through}
.task-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--cb);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.task-check:hover{border-color:var(--ok)}
.task-check.on{background:var(--ok);border-color:var(--ok)}
.task-check .ic{width:12px;height:12px;color:#fff;stroke-width:3}
.task-body{flex:1;min-width:0}
.task-title{font-size:12px;font-weight:600;color:var(--ts);line-height:1.35}
.task-meta{font-size:10px;color:var(--tsu);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.t-due-over{color:var(--crit);font-weight:600}.t-due-today{color:#c2410c;font-weight:600}
.t-trigger-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:5px;background:#fff7ed;color:#c2410c}
[data-theme="dark"] .t-trigger-tag{background:#2a1814;color:#fb923c}
.t-mod{font-size:9px;font-weight:700;padding:1px 6px;border-radius:5px;background:var(--purpleb);color:var(--purple)}

/* CONTACT */
.dm-chip{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
.dm-e{background:var(--okb);color:var(--okd)}.dm-i{background:var(--infob);color:var(--info)}

/* WORK COUNT */
.work-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.wcc{background:var(--card);border:1px solid var(--cb);border-radius:var(--rmd);padding:12px 14px;cursor:pointer;box-shadow:var(--shc)}
.wcc:hover{box-shadow:var(--shm)}
.wcc-val{font-size:22px;font-weight:800;letter-spacing:-.3px}
.wcc-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--tsu);margin-top:3px}

/* FILTER BAR */
.filter-bar{background:var(--card);border-bottom:1px solid var(--cb);padding:9px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lsearch{border:1px solid var(--cb);border-radius:var(--rsm);padding:6px 10px 6px 30px;font-size:12px;color:var(--ts);background:var(--cr);width:230px;font-family:var(--font)}
.lsearch:focus{outline:none;border-color:var(--lime)}
.lsearch-wrap{position:relative;display:flex;align-items:center}
.lsearch-wrap .ic{position:absolute;left:9px;width:14px;height:14px;color:var(--tsu)}
.filt{border:1px solid var(--cb);background:var(--card);color:var(--tm);font-size:11px;padding:5px 11px;border-radius:20px;cursor:pointer;font-weight:600;white-space:nowrap;font-family:var(--font)}
.filt:hover{border-color:var(--lime)}
.filt.on{background:var(--ts);border-color:var(--ts);color:var(--card)}
[data-theme="dark"] .filt.on{background:var(--lime);border-color:var(--lime);color:#0c1828}
.filt-right{margin-left:auto;font-size:11px;color:var(--tsu)}

/* HERO */
.bc{background:var(--card);border-bottom:1px solid var(--cb);padding:10px 24px;font-size:12px;display:flex;align-items:center;gap:8px}
.bc a{color:var(--info);cursor:pointer}.bc a:hover{text-decoration:underline}
.bc .sep{color:var(--tf)}
.hero{background:linear-gradient(135deg,#1a2d42,#0f1e2d);padding:18px 24px;color:#fff}
[data-theme="dark"] .hero{background:linear-gradient(135deg,#0c1828,#050a12)}
.hero-title{font-size:22px;font-weight:800;letter-spacing:-.4px}
.hero-meta{display:flex;gap:24px;margin-top:10px;flex-wrap:wrap}
.hero-k{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b}
.hero-v{font-size:12px;font-weight:700;color:#c8d8e8;margin-top:2px;display:flex;align-items:center;gap:5px}
.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:16px}

/* REPORTS */
.rep-card{background:var(--card);border:1px solid var(--cb);border-radius:var(--rlg);margin-bottom:10px;box-shadow:var(--shc);overflow:hidden}
.rep-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.rep-head:hover{background:var(--cr)}
.rep-ic{width:34px;height:34px;border-radius:var(--rmd);background:var(--lt);color:var(--ld);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rep-ic .ic{width:17px;height:17px}
.rep-info{flex:1}
.rep-title{font-size:13px;font-weight:700;color:var(--ts)}
.rep-desc{font-size:11px;color:var(--tm);margin-top:1px}
.rep-toggle{font-size:11px;color:var(--info);font-weight:600}
.rep-body{border-top:1px solid var(--cb);padding:0;display:none}
.rep-card.open .rep-body{display:block}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--tsu);padding:8px 16px;background:var(--cr);border-bottom:1px solid var(--cb)}
.tbl td{padding:9px 16px;border-bottom:1px solid var(--cbs);color:var(--tb)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.clk{cursor:pointer}.tbl tr.clk:hover td{background:var(--cr)}
.tbl .num{font-weight:700;color:var(--ts)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,43,60,.5);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:50px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--rlg);width:100%;max-width:520px;margin:auto;box-shadow:var(--shl);border:1px solid var(--cb)}
.modal.wide{max-width:680px}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--cbs);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700;color:var(--ts)}
.modal-close{background:none;border:none;color:var(--tsu);cursor:pointer;padding:4px;border-radius:var(--rsm);display:flex}
.modal-close:hover{background:var(--cr);color:var(--ts)}
.modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px;max-height:60vh;overflow-y:auto}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:700;color:var(--tb)}
.field .req{color:var(--crit)}
.field input,.field select,.field textarea{border:1px solid var(--cb);border-radius:var(--rsm);padding:8px 10px;font-size:13px;color:var(--ts);font-family:var(--font);background:var(--card)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(124,184,0,.12)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.type-opt{border:1.5px solid var(--cb);border-radius:var(--rmd);padding:9px 8px;cursor:pointer;text-align:center}
.type-opt:hover{border-color:var(--lime);background:var(--lt)}
.type-opt.sel{border-color:var(--lime);background:var(--lt)}
.type-opt .ic{width:18px;height:18px;margin:0 auto 3px;color:var(--tb)}
.type-opt span{font-size:11px;font-weight:600;color:var(--tb)}
.modal-foot{padding:12px 18px;border-top:1px solid var(--cbs);display:flex;justify-content:flex-end;gap:8px;background:var(--cr);border-radius:0 0 var(--rlg) var(--rlg)}
.mc-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--cb);border-radius:var(--rmd);cursor:pointer}
.mc-toggle.on{border-color:var(--ok);background:var(--okb)}
.mc-info{flex:1}
.mc-label{font-size:12px;font-weight:600;color:var(--ts)}
.mc-desc{font-size:10px;color:var(--tsu);margin-top:1px}
.tog{width:36px;height:20px;border-radius:20px;background:var(--cb);position:relative;flex-shrink:0;transition:background .15s}
.tog.on{background:var(--ok)}
.tog-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog.on .tog-knob{left:18px}

/* SEARCH OVERLAY */
.srch-result{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--cbs)}
.srch-result:hover{background:var(--cr)}
.srch-result .ic{width:15px;height:15px;color:var(--tsu)}

/* TOAST */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:900;pointer-events:none;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--nav);color:#fff;padding:10px 18px;border-radius:var(--rmd);font-size:12.5px;font-weight:500;box-shadow:var(--shl);display:flex;align-items:center;gap:8px;animation:tIn .18s ease}
.toast .ic{width:15px;height:15px;color:var(--lime)}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* AGING */
.lmc-orange{color:#b45424}
/* ASK BAR */
.ask{background:linear-gradient(135deg,var(--lt),var(--card));border:1px solid var(--lime);border-radius:var(--rlg);padding:13px 15px}
.ask-head{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ld);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ask-row{display:flex;align-items:center;gap:10px}
.ask-row>.ic{width:18px;height:18px;color:var(--ld);flex-shrink:0}
.ask input{flex:1;border:1px solid var(--cb);border-radius:20px;padding:9px 14px;font-size:13px;font-family:var(--font);background:var(--card);color:var(--ts)}
.ask input:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px rgba(124,184,0,.12)}
.ask-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.ask-chip{font-size:11px;font-weight:600;color:var(--ld);background:var(--card);border:1px solid var(--lime);border-radius:20px;padding:4px 11px;cursor:pointer}
.ask-chip:hover{background:var(--lt)}
.ask-ans{margin-top:11px}
.ask-ans:empty{margin:0}
.ask-ans-q{font-size:11px;color:var(--tsu);margin-bottom:7px}
.ask-ans-h{font-size:13px;font-weight:700;color:var(--ts);margin-bottom:8px}
.ask-card{background:var(--card);border:1px solid var(--cb);border-radius:var(--rmd);padding:12px 14px}
/* FOCUS */
.focus{background:var(--card);border:1px solid var(--cb);border-left:4px solid var(--crit);border-radius:var(--rlg);padding:14px 16px;box-shadow:var(--shm)}
.focus-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--crit);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.focus-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--cbs);cursor:pointer}
.focus-item:last-child{border-bottom:none}
.focus-item:hover .focus-carrier{color:var(--ld)}
.focus-num{width:24px;height:24px;border-radius:50%;background:var(--critb);color:var(--crit);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.focus-num .ic{width:13px;height:13px}
.focus-carrier{font-size:13px;font-weight:700;color:var(--ts)}
.focus-cond{font-size:11px;color:var(--tm);margin-top:1px}
/* RELATIONSHIP MAP */
.relmap{background:var(--card);border:1px solid var(--cb);border-radius:var(--rlg);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shc)}
.relmap-lanes{display:flex;align-items:stretch;gap:0}
.relmap-acct{display:flex;align-items:center;gap:9px;padding-right:18px;flex-shrink:0}
.relmap-branches{flex:1;display:flex;flex-direction:column;gap:9px;border-left:2px solid var(--cb)}
.relmap-bl{display:flex;align-items:flex-start;gap:10px;position:relative;padding-left:18px}
.relmap-bl:before{content:"";position:absolute;left:0;top:11px;width:14px;height:2px;background:var(--cb)}
.relmap-bl-name{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--tsu);min-width:108px;padding-top:3px}
.relmap-cts{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.relmap-ct{font-size:11px;background:var(--cr);border:1px solid var(--cb);border-radius:20px;padding:3px 9px;color:var(--tb);cursor:pointer}
.relmap-ct:hover{border-color:var(--lime);color:var(--ts)}
.relmap-cap{font-size:10.5px;color:var(--tsu);margin-top:11px;border-top:1px solid var(--cbs);padding-top:9px;line-height:1.5}
/* WORTH NOTING */
.wn{background:linear-gradient(135deg,rgba(124,58,237,.06),var(--card));border:1px solid var(--cb);border-left:3px solid var(--purple);border-radius:var(--rmd);padding:11px 14px;margin-bottom:6px;cursor:pointer}
.wn:hover{box-shadow:var(--shm)}
.wn-tag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--purple);display:flex;align-items:center;gap:5px;margin-bottom:5px}
.wn-tag .ic{width:11px;height:11px;fill:var(--purple);stroke:var(--purple)}
.wn-quote{font-size:12.5px;color:var(--ts);font-style:italic;line-height:1.5}
.wn-meta{font-size:10px;color:var(--tsu);margin-top:5px}
/* ADVANCED SEARCH AFFORDANCE */
.search input{padding-right:84px}
.adv-btn{font-size:9px;font-weight:700;color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.22);border-radius:5px;padding:3px 8px;cursor:pointer;background:transparent;position:absolute;right:7px;top:50%;transform:translateY(-50%)}
.adv-btn:hover{color:#fff;border-color:rgba(255,255,255,.45)}

.screen{display:none}.screen.active{display:block}
</style>

/* ===== ROUTING ===== */
let ROUTE='dashboard',PARAM=null;
function go(route,param){ROUTE=route;PARAM=param||null;render();const m=document.getElementById('main');if(m)m.scrollTop=0}
function render(){document.getElementById('rail').innerHTML=renderRail();document.getElementById('main').innerHTML=renderScreen()}

function setRole(r){
  ROLE=r;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.toggle('active',b.dataset.role===r));
  const R=ROLES[r];
  document.getElementById('user-av').textContent=R.init;
  document.getElementById('user-name').textContent=R.name;
  document.getElementById('user-role').textContent=R.label;
  if((ROUTE==='reports'&&!canSeeReports()))ROUTE='dashboard';
  go(ROUTE);
  toast('Viewing as '+R.label);
}
function toggleTheme(){
  const h=document.documentElement;
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');
  syncThemeBtn();
}
function syncThemeBtn(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.getElementById('theme-btn').innerHTML=ICON(dark?'sun':'moon');
}

/* ===== RAIL ===== */
function renderRail(){
  const items=[
    {k:'dashboard',ic:'dashboard',label:'Dashboard',badge:vAttention().length,red:true},
    {sep:'Carriers'},
    {k:'accounts',ic:'building',label:'Accounts'},
    {k:'pursuits',ic:'target',label:'Pursuits'},
    {k:'contacts',ic:'users',label:'Contacts'},
    {k:'gonecold',ic:'clock',label:'Gone Cold',badge:coldAccounts().length,red:false},
    {k:'activities',ic:'activity',label:'Activities'},
    {sep:'Work'},
    {k:'tasks',ic:'checks',label:'Work Queue',badge:vTasks().filter(t=>t.due==='overdue'&&!t.done).length,red:true},
  ];
  if(canSeeReports()){items.push({sep:ROLE==='owner'?'Owner View':'Management'});items.push({k:'reports',ic:'chart',label:'Reports'})}
  let h='';let open=false;
  items.forEach(it=>{
    if(it.sep){if(open)h+='</div>';h+=`<div class="rail-sec"><div class="rail-lbl">${it.sep}</div>`;open=true;return}
    if(!open){h+='<div class="rail-sec">';open=true}
    const active=ROUTE===it.k||(ROUTE==='account-detail'&&it.k==='accounts')||(ROUTE==='bl-detail'&&it.k==='pursuits')||(ROUTE==='contact-detail'&&it.k==='contacts');
    const badge=it.badge?`<span class="r-badge ${it.red?'rb-red':'rb-lime'}">${it.badge}</span>`:'';
    h+=`<div class="rail-item ${active?'active':''}" onclick="go('${it.k}')" title="${it.label}">${ICON(it.ic)}<span>${it.label}</span>${badge}</div>`;
  });
  if(open)h+='</div>';
  h=`<div class="rail-sec" style="flex:1">${h}</div>`;
  h+=`<div class="rail-collapse" onclick="toggleRail()" id="rail-collapse">${ICON('cleft')}<span>Collapse</span></div>`;
  return h;
}
function toggleRail(){
  const r=document.getElementById('rail');r.classList.toggle('collapsed');
  document.getElementById('rail-collapse').querySelector('svg').outerHTML=ICON(r.classList.contains('collapsed')?'cright':'cleft');
}

function renderScreen(){
  switch(ROUTE){
    case 'dashboard':return screenDashboard();
    case 'accounts':return screenAccounts();
    case 'account-detail':return screenAccountDetail(PARAM);
    case 'pursuits':return screenPursuits();
    case 'bl-detail':return screenBLDetail(PARAM);
    case 'contacts':return screenContacts();
    case 'contact-detail':return screenContactDetail(PARAM);
    case 'gonecold':return screenGoneCold();
    case 'activities':return screenActivities();
    case 'tasks':return screenTasks();
    case 'reports':return canSeeReports()?screenReports():screenDashboard();
    default:return screenDashboard();
  }
}

let acctFilter='';
function screenAccounts(){
  if(PARAM){acctFilter=PARAM;PARAM=null;}
  const all=vAccounts();
  const counts={};Object.keys(RS).forEach(k=>counts[k]=all.filter(a=>a.rs===k).length);
  const fb=Object.entries(RS).filter(([k])=>counts[k]>0).map(([k,v])=>`<div class="filt ${acctFilter===k?'on':''}" onclick="setAcctFilter('${k}')">${v.label} <b style="margin-left:3px">${counts[k]}</b></div>`).join('');
  let rows=all;
  if(acctFilter)rows=rows.filter(a=>a.rs===acctFilter);
  const rowHTML=rows.map(a=>{
    const ld=lmcDays(a);
    const lmcCls=agingClass(ld);
    const lmcLbl=ld===null?'No contact':ld===0?'Today':ld+'d ago';
    const lc=vLines().filter(l=>l.accountId===a.id).length;
    return `<div class="row" onclick="go('account-detail','${a.id}')">
      <div class="av" style="background:${aColor(a.name)}">${initials(a.name)}</div>
      <div class="row-body">
        <div class="row-name">${esc(a.name)} ${a.isStrategic?`<span class="strat">${ICON('star','ic')}Strategic</span>`:''} <span class="rs ${RS[a.rs].cls}">${RS[a.rs].label}</span></div>
        <div class="row-meta">${esc(a.hq)} · ${esc(a.size)} · ${lc} business line${lc!==1?'s':''}</div>
      </div>
      <div class="row-right">
        <div class="lmc ${lmcCls}">${ICON('clock','ic')} ${lmcLbl}${a.lmcWho?' · '+esc(a.lmcWho):''}</div>
        ${ROLE!=='sales'?`<div class="owner-chip"><div class="owner-av" style="background:${a.ownerColor}">${initials(a.owner)}</div>${esc(a.owner)}${a.prevOwner?` <span style="color:var(--tf)">(from ${esc(a.prevOwner)})</span>`:''}</div>`:''}
      </div>
    </div>`;
  }).join('');
  return `
  <div class="page-hdr">
    <div><div class="page-title">Accounts</div><div class="page-sub">${all.length} carrier${all.length!==1?'s':''} · ${all.filter(a=>a.rs==='active-client').length} active client${all.filter(a=>a.rs==='active-client').length!==1?'s':''} · ${ROLES[ROLE].scope}</div></div>

  </div>

    <div class="lsearch-wrap">${ICON('search')}<input class="lsearch" placeholder="Search accounts…" oninput="liveFilter(this,'.row')"></div>
    <div class="filt ${!acctFilter?'on':''}" onclick="setAcctFilter('')">All</div>
    ${fb}<span class="filt-right">${rows.length} shown</span>
  </div>
  <div class="content-body">${rowHTML||'<div class="empty"><strong>No accounts in this view.</strong></div>'}</div>`;

/* ===== ASK (in-app, scripted — production wires to Claude) ===== */
function ask(q){const el=document.getElementById('ask-input');if(el)el.value=q;runAsk(q)}
function ansList(title,rows){
  if(!rows.length)return `<div class="ask-card"><div class="ask-ans-h">${esc(title)}</div><div style="font-size:12px;color:var(--tm)">Nothing matches — all clear.</div></div>`;
  return `<div class="ask-card"><div class="ask-ans-h">${esc(title)} · ${rows.length}</div>`+rows.map(r=>`<div class="focus-item" onclick="go('account-detail','${r.acctId}')"><div class="focus-num" style="background:var(--lt);color:var(--ld)">${ICON('arr','ic')}</div><div style="flex:1"><div class="focus-carrier">${esc(r.name)}</div><div class="focus-cond">${esc(r.sub)}</div></div></div>`).join('')+`</div>`;
}
function runAsk(q){
  const out=document.getElementById('ask-ans');if(!out)return;
  q=(q||'').toLowerCase().trim();
  if(!q){out.innerHTML='';return}
  const accts=vAccounts();let h='';
  if(/cold|quiet|stale|gone|haven|not (talk|contact|spoke|heard)/.test(q)){
    let list=accts.filter(a=>{const d=lmcDays(a);return d===null||d>60});
    if(/strateg/.test(q))list=list.filter(a=>a.isStrategic);
    list.sort((a,b)=>((lmcDays(b)===null?99999:lmcDays(b))-(lmcDays(a)===null?99999:lmcDays(a))));
    h=ansList('Relationships that have gone quiet'+(/strateg/.test(q)?' (strategic)':''),list.map(a=>({acctId:a.id,name:a.name,sub:(lmcDays(a)===null?'No contact logged':lmcDays(a)+' days since last meaningful contact')+' · '+a.owner})));
  } else if(/overdue/.test(q)){
    const t=vTasks().filter(x=>x.due==='overdue'&&!x.done);
    h=ansList('Overdue tasks',t.map(x=>({acctId:x.acctId,name:x.carrier,sub:x.title})));
  } else if(/strateg/.test(q)){
    h=ansList('Strategic carriers',accts.filter(a=>a.isStrategic).map(a=>({acctId:a.id,name:a.name,sub:RS[a.rs].label+' · owner '+a.owner})));
  } else if(/risk|no claim|active client/.test(q)){
    h=ansList('Active client risks',vRisks().map(a=>({acctId:a.acctId,name:a.carrier,sub:a.cond})));
  } else if(/attention|need|urgent|focus|today|what.*do/.test(q)){
    h=ansList(vAttention().length+' items need attention',vAttention().map(a=>({acctId:a.acctId,name:a.carrier,sub:a.cond})));
  } else {
    const a=accts.find(x=>q.includes(x.name.toLowerCase().split(' ')[0]));
    if(a){const d=lmcDays(a);const ts=vTasks().filter(t=>t.acctId===a.id&&!t.done);const sg=SIGNALS.filter(s=>s.acctId===a.id);
      h=`<div class="ask-card"><div class="ask-ans-h">${esc(a.name)} — ${RS[a.rs].label}</div>
      <div style="font-size:12px;color:var(--tb);line-height:1.7">Owner: <b>${esc(a.owner)}</b><br>Last meaningful contact: <b>${d===null?'none logged':d+' days ago'}</b>${a.lmcWho?' ('+esc(a.lmcWho)+')':''}<br>${ts.length?'<b>'+ts.length+'</b> open task'+(ts.length>1?'s':''):'No open tasks'}.${sg.length?'<br>Worth noting: <i>"'+esc(sg[0].quote)+'"</i>':''}</div>
      <div style="margin-top:9px"><button class="btn btn-primary" onclick="go('account-detail','${a.id}')">${ICON('arr')} Open ${esc(a.name)}</button></div></div>`;
    } else {
      h=`<div class="ask-card" style="font-size:12px;color:var(--tm);line-height:1.6">Try: <b>what's gone cold</b>, <b>what needs attention</b>, <b>overdue tasks</b>, <b>strategic carriers</b>, <b>active client risks</b> — or name a carrier (e.g. "Nationwide").</div>`;
    }
  }
  out.innerHTML=`<div class="ask-ans-q">You asked: "${esc(q)}"</div>${h}`;
}

function openAdvancedSearch(){

function runAdvancedSearch(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:''};
  const q=(g('as-q')||'').toLowerCase(),rs=g('as-rs'),ow=g('as-owner'),st=g('as-strat'),cold=g('as-cold');
  let res=vAccounts();
  if(q)res=res.filter(a=>a.name.toLowerCase().includes(q));
  if(rs)res=res.filter(a=>a.rs===rs);
  if(ow)res=res.filter(a=>a.owner===ow);
  if(st)res=res.filter(a=>a.isStrategic);
  if(cold==='cold')res=res.filter(a=>{const d=lmcDays(a);return d===null||d>60});
  if(cold==='fresh')res=res.filter(a=>{const d=lmcDays(a);return d!==null&&d<30});
  const box=document.getElementById('as-results');if(!box)return;
  box.innerHTML=`<div class="ask-ans-q">${res.length} match${res.length!==1?'es':''}</div>`+(res.map(a=>`<div class="srch-result" onclick="closeModal();go('account-detail','${a.id}')">${ICON('building')}<div><div style="font-weight:600;color:var(--ts)">${esc(a.name)}</div><div style="font-size:10px;color:var(--tsu)">${RS[a.rs].label} · ${esc(a.owner)}</div></div></div>`).join('')||'<div class="empty">No matches.</div>');
}

  const opts=ACCOUNTS.map(a=>`<option value="${a.id}" ${a.id===pre?'selected':''}>${esc(a.name)}</option>`).join('');
  const ty=[['email_out','mail','Email Sent'],['email_in','mail','Email Received'],['call_out','phone','Call Made'],['call_in','phone','Call Received'],['meeting','cal','Meeting'],['note','note','Note']];
  ACT_TYPE='email_out';MC_ON=true;
  openModal(`<div class="modal-head"><span class="modal-title">Log Activity</span><button class="modal-close" onclick="closeModal()">${ICON('x')}</button></div>
  <div class="modal-body">
    <div class="field"><label>Activity Type <span class="req">*</span></label><div class="type-grid">${ty.map(([t,i,l])=>`<div class="type-opt ${t==='email_out'?'sel':''}" data-t="${t}" onclick="selType('${t}',this)">${ICON(i)}<span>${l}</span></div>`).join('')}</div></div>
    <div class="field-row"><div class="field"><label>Account <span class="req">*</span></label><select id="f-acct"><option value="">— Select —</option>${opts}</select></div><div class="field"><label>Contact</label><input id="f-contact" placeholder="Contact name"></div></div>
    <div class="field"><label>Subject <span class="req">*</span></label><input id="f-subj" placeholder="What was this about?"></div>
    <div class="mc-toggle on" id="mc-t" onclick="toggleMC()"><div class="mc-info"><div class="mc-label">Counts as Meaningful Contact</div><div class="mc-desc">Updates Last Meaningful Contact on the carrier &amp; line</div></div><div class="tog on" id="mc-tog"><div class="tog-knob"></div></div></div>
  </div>
  <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveActivity()">Save Activity</button></div>`);
}
function selType(t,el){ACT_TYPE=t;document.querySelectorAll('.type-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');MC_ON=t!=='note';document.getElementById('mc-t').classList.toggle('on',MC_ON);document.getElementById('mc-tog').classList.toggle('on',MC_ON)}
function toggleMC(){MC_ON=!MC_ON;document.getElementById('mc-t').classList.toggle('on',MC_ON);document.getElementById('mc-tog').classList.toggle('on',MC_ON)}
function saveActivity(){const ac=document.getElementById('f-acct').value,s=document.getElementById('f-subj').value.trim();if(!ac){alert('Account required.');return}if(!s){alert('Subject required.');return}const cont=document.getElementById('f-contact').value.trim()||'';const map={email_out:'mail',email_in:'mail',call_out:'phone',call_in:'phone',meeting:'cal',note:'note'};const cls={email_out:'ai-email',email_in:'ai-email',call_out:'ai-call',call_in:'ai-call',meeting:'ai-meeting',note:'ai-note'};ACTIVITIES.unshift({type:ACT_TYPE,subject:s,accountId:ac,contact:cont,at:TODAY.toISOString(),meaningful:MC_ON,ic:map[ACT_TYPE],cls:cls[ACT_TYPE]});if(MC_ON){const a=ACCOUNTS.find(x=>x.id===ac);if(a){a.lmc=TODAY.toISOString();a.lmcWho=cont||'Unknown'}}closeModal();toast('Activity logged'+(MC_ON?' · LMC updated':''));render()}

function openAddTask(pre){
  const opts=ACCOUNTS.map(a=>`<option value="${a.id}" ${a.id===pre?'selected':''}>${esc(a.name)}</option>`).join('');
  openModal(`<div class="modal-head"><span class="modal-title">Add Task</span><button class="modal-close" onclick="closeModal()">${ICON('x')}</button></div>
  <div class="modal-body">
    <div class="field"><label>Task <span class="req">*</span></label><input id="f-title" placeholder="What needs to happen?"></div>
    <div class="field-row"><div class="field"><label>Account</label><select id="f-acct"><option value="">— Select —</option>${opts}</select></div><div class="field"><label>Due</label><select id="f-due"><option value="today">Today</option><option value="overdue">Overdue</option></select></div></div>
    <div class="field"><label>Notes</label><textarea rows="2"></textarea></div>
  </div>
  <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveTask()">Create Task</button></div>`);
}
function saveTask(){const t=document.getElementById('f-title').value.trim();if(!t){alert('Task required.');return}const ac=document.getElementById('f-acct').value;const a=ACCOUNTS.find(x=>x.id===ac);TASKS.unshift({id:'t_'+Math.random().toString(36).slice(2,7),title:t,carrier:a?a.name:'',acctId:ac,owner:ROLE==='sales'?'Joe Rivera':'Joe Rivera',due:document.getElementById('f-due').value,daysOver:0,isTrigger:false,done:false});closeModal();toast('Task created');render()}

function openNewBusinessLine(pre){
  const opts=ACCOUNTS.map(a=>`<option value="${a.id}" ${a.id===pre?'selected':''}>${esc(a.name)}</option>`).join('');
  openModal(`<div class="modal-head"><span class="modal-title">New Business Line</span><button class="modal-close" onclick="closeModal()">${ICON('x')}</button></div>
  <div class="modal-body">
    <div class="field"><label>Account <span class="req">*</span></label><select id="f-acct"><option value="">— Select —</option>${opts}</select></div>
    <div class="field"><label>Business Line Name <span class="req">*</span></label><input id="f-name" placeholder="e.g. CAT / Storm, Commercial Property"></div>
    <div class="field-row"><div class="field"><label>Starting Stage</label><select id="f-stage"><option value="prospect">Prospect</option><option value="engaged">Engaged</option><option value="discovery">Discovery</option></select></div><div class="field"><label>Owner</label><select><option>Joe Rivera</option><option>Mark Vetrovec</option><option>Brent Hughes</option></select></div></div>
    <div class="field"><label>Pursuit Summary</label><textarea rows="2" placeholder="3-4 sentences so anyone can understand the opportunity."></textarea></div>
  </div>
  <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveLine()">Create Business Line</button></div>`);
}
function saveLine(){const ac=document.getElementById('f-acct').value,n=document.getElementById('f-name').value.trim();if(!ac){alert('Account required.');return}if(!n){alert('Name required.');return}const a=ACCOUNTS.find(x=>x.id===ac);LINES.push({id:'l_'+Math.random().toString(36).slice(2,7),accountId:ac,name:n,stage:document.getElementById('f-stage').value,health:'ok',lmc:null,lmcWho:null,owner:'Joe Rivera'});if(a&&(a.rs==='dormant'||a.rs==='nurture')){a.rs='active-pursuit';toast('Account → Active Pursuit')}closeModal();toast('Business Line created: '+(a?a.name:'')+' · '+n);go('account-detail',ac)}

/* ===== UTIL ===== */
function liveFilter(input,sel){const q=input.value.toLowerCase();document.querySelectorAll('.content-body '+sel).forEach(el=>{el.style.display=el.textContent.toLowerCase().includes(q)?'':'none'})}
function toast(msg){const el=document.createElement('div');el.className='toast';el.innerHTML=ICON('check')+esc(msg);document.getElementById('toast-wrap').appendChild(el);setTimeout(()=>el.remove(),2400)}

/* ===== INIT ===== */
syncThemeBtn();
render();
</script>
</body>
</html>
